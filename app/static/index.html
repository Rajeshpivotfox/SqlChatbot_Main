<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SQL Chatbot</h1>
            <p class="subtitle">Ask questions about your data in plain English</p>
        </header>

        <div id="chat" class="chat-area">
            <div class="message bot">
                <div class="message-content">
                    Hello! I can help you query your database using natural language.
                    Try asking something like <em>"How many transactions are in the database?"</em>
                </div>
            </div>
        </div>

        <form id="query-form" class="input-area">
            <input
                type="text"
                id="question-input"
                placeholder="Ask a question about your data..."
                autocomplete="off"
                required
                minlength="3"
                maxlength="2000"
            >
            <button type="submit" id="submit-btn">Ask</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
